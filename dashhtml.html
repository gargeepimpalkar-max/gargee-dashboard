<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GARGEEE</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <div class="header-brand">
        <span class="brand-dot"></span>
        <h1 class="brand-name">WHAT'S UP BABYYY?</h1>
      </div>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
        <span class="toggle-icon">☀️</span>
      </button>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="notes">
        <span class="tab-icon">📝</span>
        <span class="tab-label">Notes</span>
      </button>
      <button class="tab-btn" data-tab="tasks">
        <span class="tab-icon">✅</span>
        <span class="tab-label">Tasks</span>
      </button>
      <button class="tab-btn" data-tab="calendar">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Calendar</span>
      </button>
    </nav>

    <main class="tab-content-area">

      <!-- NOTES TAB -->
      <section class="tab-panel active" id="tab-notes">
        <div class="panel-header">
          <h2 class="panel-title">Notes</h2>
          <div class="category-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="personal">🔒 Jonesing</button>
            <button class="filter-btn" data-filter="professional">Professional</button>
            <button class="filter-btn" data-filter="watchlater">Verbum Nova</button>
          </div>
        </div>

        <div class="personal-controls hidden" id="personalControls">
          <button class="action-btn secondary" id="viewNotesBtn">🔍 View Notes</button>
          <button class="action-btn primary" id="addNotePersonalBtn">✏️ Add Note</button>
        </div>

        <div class="note-form-container hidden" id="noteFormContainer">
          <div class="form-card">
            <textarea class="form-textarea" id="noteTextarea" placeholder="Write your note..." rows="4"></textarea>
            <select class="form-select" id="noteCategorySelect">
              <option value="personal">🔒 Personal</option>
              <option value="professional">Professional</option>
              <option value="watchlater">Watch Later</option>
            </select>
            <div class="form-actions">
              <button class="action-btn secondary" id="cancelNoteBtn">Cancel</button>
              <button class="action-btn primary" id="saveNoteBtn">Save Note</button>
            </div>
          </div>
        </div>

        <button class="fab" id="addNoteBtn" title="Add Note">+</button>
        <div class="notes-list" id="notesList"></div>
      </section>

      <!-- TASKS TAB -->
      <section class="tab-panel" id="tab-tasks">
        <div class="panel-header">
          <h2 class="panel-title">Tasks</h2>
        </div>
        <div class="task-form-card form-card">
          <input class="form-input" id="taskInput" type="text" placeholder="Add a new task..." />
          <div class="task-form-row">
            <select class="form-select" id="taskPriority">
              <option value="low">🟢 Make sure you do it</option>
              <option value="medium" selected>🟡 DO it thoda lavkrr</option>
              <option value="high">🔴 Do it nowww</option>
            </select>
            <button class="action-btn primary" id="addTaskBtn">Add Task</button>
          </div>
        </div>
        <div class="tasks-list" id="tasksList"></div>
      </section>

      <!-- CALENDAR TAB -->
      <section class="tab-panel" id="tab-calendar">
        <div class="panel-header calendar-nav">
          <button class="nav-btn" id="prevMonth">‹</button>
          <h2 class="panel-title" id="calMonthLabel">Month Year</h2>
          <button class="nav-btn" id="nextMonth">›</button>
        </div>
        <div class="calendar-weekdays">
          <span>Su</span><span>Mo</span><span>Tu</span>
          <span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

    </main>
  </div>

  <!-- Passcode Modal -->
  <div class="modal-overlay hidden" id="passcodeModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>🔒 Personal Notes</h3>
        <button class="modal-close" data-close="passcodeModal">✕</button>
      </div>
      <p class="modal-sub">Enter passcode to view personal notes</p>
      <input class="form-input" id="passcodeInput" type="password" placeholder="Enter passcode..." />
      <div class="modal-error hidden" id="passcodeError">Incorrect passcode. Try again.</div>
      <div class="form-actions">
        <button class="action-btn secondary" data-close="passcodeModal">Cancel</button>
        <button class="action-btn primary" id="submitPasscode">Unlock</button>
      </div>
    </div>
  </div>

  <!-- Event Modal -->
  <div class="modal-overlay hidden" id="eventModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="eventModalTitle">Events</h3>
        <button class="modal-close" data-close="eventModal">✕</button>
      </div>
      <div class="event-list" id="eventList"></div>
      <div class="event-form">
        <input class="form-input" id="eventText" type="text" placeholder="Event description..." />
        <div class="color-picker" id="colorPicker">
          <span class="color-dot selected" data-color="#4CAF50" style="background:#4CAF50"></span>
          <span class="color-dot" data-color="#2196F3" style="background:#2196F3"></span>
          <span class="color-dot" data-color="#FF9800" style="background:#FF9800"></span>
          <span class="color-dot" data-color="#E91E63" style="background:#E91E63"></span>
          <span class="color-dot" data-color="#9C27B0" style="background:#9C27B0"></span>
          <span class="color-dot" data-color="#00BCD4" style="background:#00BCD4"></span>
        </div>
        <div class="form-actions">
          <button class="action-btn secondary" id="cancelEventBtn">Cancel</button>
          <button class="action-btn primary" id="saveEventBtn">Save Event</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
